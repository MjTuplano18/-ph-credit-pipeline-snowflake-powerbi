# FILE: cd.yml
# PURPOSE: Build and publish the Airflow Docker image to GHCR
# PHASE: 6
# DEPENDS ON: docker/airflow/Dockerfile
# OUTPUTS: Container image in GitHub Container Registry

name: cd

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/airflow/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}/ph-credit-airflow:latest
            ghcr.io/${{ github.repository }}/ph-credit-airflow:${{ github.sha }}
