# FILE: dbt_project.yml
# PURPOSE: Configure dbt models, profiles, and materializations
# PHASE: 4
# DEPENDS ON: dbt installed and profiles.yml configured
# OUTPUTS: dbt project settings for this pipeline

name: "ph_credit_pipeline"
version: "1.0.0"
config-version: 2

profile: "ph_credit_pipeline"

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ph_credit_pipeline:
    staging:
      +materialized: view
      +schema: STAGING
    intermediate:
      +materialized: view
      +schema: STAGING
    mart:
      +materialized: table
      +schema: MART
