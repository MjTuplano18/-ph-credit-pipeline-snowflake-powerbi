# FILE: docker-compose.yml
# PURPOSE: Run Airflow locally with Docker (Phase 5 fallback)
# PHASE: 5
# DEPENDS ON: Docker Desktop and .env with Snowflake credentials
# OUTPUTS: Airflow webserver and scheduler containers

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: ph-credit-airflow:2.8.4-python3.10
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      PYTHON_BIN: python
      DBT_BIN: dbt
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
      - ./.dbt:/home/airflow/.dbt
      - ./load:/opt/airflow/load
      - ./extract:/opt/airflow/extract
      - ./data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: ph-credit-airflow:2.8.4-python3.10
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      PYTHON_BIN: python
      DBT_BIN: dbt
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
      - ./.dbt:/home/airflow/.dbt
      - ./load:/opt/airflow/load
      - ./extract:/opt/airflow/extract
      - ./data:/opt/airflow/data
    command: scheduler

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: ph-credit-airflow:2.8.4-python3.10
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
      - ./.dbt:/home/airflow/.dbt
      - ./load:/opt/airflow/load
      - ./extract:/opt/airflow/extract
      - ./data:/opt/airflow/data
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --password admin \
      --firstname Admin --lastname User --role Admin --email admin@example.com"

volumes:
  postgres-db-volume:
